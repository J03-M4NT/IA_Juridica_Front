<?xml version="1.0" encoding="UTF-8"?>
<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LEXIT AI logo">
  <defs>
    <style>
      .c1{fill:#39c7d8;fill-opacity:0.95}
      .c2{fill:#ff64b0;fill-opacity:0.95}
      .c3{fill:#ff9b6a;fill-opacity:0.95}
      .c4{fill:#8b5cf6;fill-opacity:0.95}
    </style>
  </defs>
  <!-- four overlapping circles forming a flower-like logo -->
  <circle class="c1" cx="60" cy="48" r="36" />
  <circle class="c2" cx="100" cy="48" r="36" />
  <circle class="c3" cx="60" cy="92" r="36" />
  <circle class="c4" cx="100" cy="92" r="36" />
  <!-- small center gloss -->
  <circle cx="80" cy="70" r="10" fill="#4b2f6b" fill-opacity="0.12" />
</svg>
